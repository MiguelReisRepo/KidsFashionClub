  <text x="200" y="445" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#A1A1A1" text-anchor="middle" letter-spacing="3">KIDS FAN CLUB</text>
  <text x="200" y="465" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#5C5C5C" text-anchor="middle" letter-spacing="2">CONJUNTO • KIT</text>
</svg>
