<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F1F1F"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B923" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E8B923" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <ellipse cx="200" cy="180" rx="180" ry="120" fill="url(#glow)"/>

  <!-- T-shirt -->
  <path d="M135 135 L180 110 L220 110 L265 135 L280 175 L255 185 L255 260 L145 260 L145 185 L120 175 Z"
