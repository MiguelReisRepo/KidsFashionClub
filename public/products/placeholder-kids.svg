  <!-- collar -->
  <path d="M188 110 Q200 122 212 110" fill="none" stroke="#E8B923" stroke-width="1.5" opacity="0.6"/>

  <!-- Shorts -->
  <path d="M155 285 L245 285 L255 305 L250 395 L215 395 L210 330 L190 330 L185 395 L150 395 L145 305 Z"
        fill="#1F1F1F" stroke="#E8B923" stroke-width="2" opacity="0.95"/>
