<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F1F1F"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B923" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E8B923" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <ellipse cx="200" cy="180" rx="180" ry="120" fill="url(#glow)"/>

  <!-- Jersey back -->
  <path d="M120 160 L180 130 L220 130 L280 160 L300 220 L260 230 L260 380 L140 380 L140 230 L100 220 Z"
        fill="#1F1F1F" stroke="#E8B923" stroke-width="2" opacity="0.95"/>
  <!-- back collar (rounded high cut) -->
  <path d="M180 130 Q200 140 220 130" fill="none" stroke="#E8B923" stroke-width="1.5" opacity="0.6"/>
  <!-- player number -->
  <text x="200" y="290" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="800" fill="#E8B923" text-anchor="middle" opacity="0.45">10</text>

  <text x="200" y="430" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#A1A1A1" text-anchor="middle" letter-spacing="3">KIDS FAN CLUB</text>
  <text x="200" y="450" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" fill="#5C5C5C" text-anchor="middle" letter-spacing="2">BACK</text>
</svg>
