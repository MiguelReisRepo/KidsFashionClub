<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F1F1F"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B923" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8B923" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <ellipse cx="200" cy="180" rx="180" ry="120" fill="url(#glow)"/>

  <!-- Adult jersey silhouette, dashed outline, ghost fill -->
  <path d="M120 160 L180 130 L220 130 L280 160 L300 220 L260 230 L260 380 L140 380 L140 230 L100 220 Z"
        fill="#1F1F1F" stroke="#E8B923" stroke-width="2" stroke-dasharray="8 5" opacity="0.55"/>
  <circle cx="200" cy="155" r="10" fill="#E8B923" opacity="0.4"/>

  <!-- Clock indicator (upper right) -->
  <g transform="translate(335, 75)">
    <circle cx="0" cy="0" r="22" fill="#0A0A0A" stroke="#E8B923" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-13" stroke="#E8B923" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="9" y2="6" stroke="#E8B923" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="#E8B923"/>
  </g>

  <text x="200" y="430" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#A1A1A1" text-anchor="middle" letter-spacing="3">KIDS FAN CLUB</text>
</svg>
